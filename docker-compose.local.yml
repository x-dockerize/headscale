services:
  headscale:
    image: headscale/headscale:${HEADSCALE_VERSION:?required}
    container_name: headscale
    restart: unless-stopped
    command: serve
    environment:
      - TZ=Europe/Istanbul
    ports:
      - 3478:3478/udp
    volumes:
      - ./.docker/headscale/config:/etc/headscale
      - ./.docker/headscale/data:/var/lib/headscale
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      - traefik.http.routers.headscale.rule=Host(`headscale.${DOMAIN}`)
      - traefik.http.routers.headscale.entrypoints=https
      - traefik.http.routers.headscale.tls.certresolver=cloudflare
      - traefik.http.routers.headscale.service=headscale

      # --- CORS Middleware Ayarları (SIHİRLİ KISIM) ---
      - traefik.http.middlewares.headscale-cors.headers.accesscontrolalloworiginlist=https://headscale-ui.${DOMAIN}
      - traefik.http.middlewares.headscale-cors.headers.accesscontrolallowmethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
      - traefik.http.middlewares.headscale-cors.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.headscale-cors.headers.accesscontrolmaxage=100

      # --- Middleware'i Router'a Bağlama ---
      - traefik.http.routers.headscale.middlewares=headscale-cors

      # Services
      - traefik.http.services.headscale.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:${HEADSCALE_UI_VERSION:?required}
    container_name: headscale-ui
    restart: unless-stopped
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      # Subdomain Kuralı
      - traefik.http.routers.headscale-ui.rule=Host(`headscale-ui.${DOMAIN}`)
      - traefik.http.routers.headscale-ui.entrypoints=https
      - traefik.http.routers.headscale-ui.tls.certresolver=cloudflare
      - traefik.http.routers.headscale-ui.middlewares=internal@docker # Security Middleware

      # Service Ayarları
      - traefik.http.routers.headscale-ui.service=headscale-ui
      - traefik.http.services.headscale-ui.loadbalancer.server.port=8080


networks:
  traefik-network:
    external: true
