services:
  headscale:
    image: headscale/headscale:${HEADSCALE_VERSION:?required}
    container_name: headscale
    pull_policy: missing
    restart: always
    command: serve
    environment:
      - TZ=Europe/Istanbul
    expose:
      - 8080 #  Main server
      - 9090 #  Metrics
      - 50443 # GRPC
    ports:
      - 0.0.0.0:3478:3478/udp # stun
    volumes:
      - ./.docker/headscale/config/config.yaml:/etc/headscale/config.yaml:ro
      - ./.docker/headscale/config/extra-records.json:/etc/headscale/extra-records.json:ro
      - ./.docker/headscale/data:/var/lib/headscale
      - headscale-socket:/var/run/headscale:rw
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      # Routers
      - traefik.http.routers.headscale.rule=Host(`${HEADSCALE_SERVER_HOSTNAME:?required}`)
      - traefik.http.routers.headscale.entrypoints=https
      - traefik.http.routers.headscale.tls.certresolver=cloudflare
      - traefik.http.routers.headscale.service=headscale

      # Services
      - traefik.http.services.headscale.loadbalancer.server.port=8080

      - me.tale.headplane.target=headscale
    healthcheck:
      test: [ "CMD", "headscale", "health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  headscale-console:
    image: ghcr.io/rickli-cloud/headscale-console:${HEADSCALE_CONSOLE_VERSION:?required}
    container_name: headscale-console
    pull_policy: missing
    restart: always
    command: serve --base /console
    expose:
      - 3000
    volumes:
      - ./.docker/headscale/config/config.yaml:/etc/headscale/config.yaml:ro
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      # Routers
      - traefik.http.routers.headscale-console.rule=Host(`${HEADSCALE_SERVER_HOSTNAME:?required}`) && PathPrefix(`/console`)
      - traefik.http.routers.headscale-console.entrypoints=https
      - traefik.http.routers.headscale-console.tls.certresolver=cloudflare
      - traefik.http.routers.headscale-console.service=headscale-console

      # Services
      - traefik.http.services.headscale-console.loadbalancer.server.port=3000

  headplane:
    image: ghcr.io/tale/headplane:${HEADPLANE_VERSION:?required}
    container_name: headplane
    restart: unless-stopped
    expose:
      - 3000
    volumes:
      - ./.docker/headplane/config/config.yaml:/etc/headplane/config.yaml
      - ./.docker/headplane/data/storage:/var/lib/headplane
      - ./.docker/headscale/config/config.yaml:/etc/headscale/config.yaml
      - ./.docker/headscale/config/dns_records.json:/etc/headscale/dns_records.json
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-network

      # Routers
      - traefik.http.routers.headplane.rule=Host(`${HEADSCALE_SERVER_HOSTNAME:?required}`) && PathPrefix(`/admin`)
      - traefik.http.routers.headplane.entrypoints=https
      - traefik.http.routers.headplane.tls.certresolver=cloudflare
      - traefik.http.routers.headplane.service=headplane

      # Services
      - traefik.http.services.headplane.loadbalancer.server.port=3000


volumes:
  headscale-socket:
    name: headscale-socket


networks:
  traefik-network:
    external: true
